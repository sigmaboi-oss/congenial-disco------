<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* 🔥 BACKGROUND LAYER (MATCHES MASTER CARD) */
#latest-members {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
  box-sizing: border-box;

  background: linear-gradient(160deg, #050505, #0d0d0d);
  border-radius: 12px;

  /* depth blend */
  box-shadow: inset 0 0 12px rgba(255, 80, 0, 0.15);
}

/* 🔥 MEMBER CARD */
.member {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 10px;

  background: linear-gradient(145deg, #0a0a0a, #111);
  border: 1px solid rgba(255,60,0,0.2);

  color: white;
  font-size: 12px;
  position: relative;
  text-decoration: none;

  transition: all 0.25s ease;
}

/* 🔥 INNER HOVER */
.member:hover {
  transform: translateY(-2px);

  background: linear-gradient(145deg, #111, #181818);
  border: 1px solid rgba(255,80,0,0.5);

  box-shadow:
    0 0 10px rgba(255,60,0,0.6),
    0 0 20px rgba(255,100,0,0.4);
}

/* AVATAR */
.member img {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid #ff3c00;
  object-fit: cover;

  transition: all 0.25s ease;
}

.member:hover img {
  box-shadow:
    0 0 8px #ff3c00,
    0 0 16px #ff6a00;
}

/* TEXT */
.info {
  display: flex;
  flex-direction: column;
}

.name {
  font-size: 13px;
}

.date {
  font-size: 10px;
  color: #aaa;
}

/* STATUS */
.status {
  position: absolute;
  right: 8px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.online { background: #00ff88; }
.offline { background: #666; }

</style>
</head>

<body>

<div id="latest-members">Loading warriors...</div>

<script>
async function load(){
  try{
    const res = await fetch("https://api.chess.com/pub/club/group-a162138be57d83c3500191b84a4b325d/members");
    const data = await res.json();

    let members = [...(data.weekly||[]), ...(data.monthly||[]), ...(data.all_time||[])];

    const map = {};
    members.forEach(m=>{
      if(!map[m.username] || m.joined > map[m.username].joined){
        map[m.username] = m;
      }
    });

    members = Object.values(map)
      .sort((a,b)=>b.joined-a.joined)
      .slice(0,6);

    const full = await Promise.all(members.map(async m=>{
      const r = await fetch(`https://api.chess.com/pub/player/${m.username}`);
      const p = await r.json();
      return {
        name: m.username,
        date: new Date(m.joined*1000).toLocaleDateString(),
        avatar: p.avatar || "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif",
        status: p.status || "offline"
      };
    }));

    document.getElementById("latest-members").innerHTML = full.map(m=>`
      <a href="https://www.chess.com/member/${m.name}" target="_blank" class="member">
        <img src="${m.avatar}">
        <div class="info">
          <div class="name">${m.name}</div>
          <div class="date">Joined ${m.date}</div>
        </div>
        <div class="status ${m.status === "online" ? "online" : "offline"}"></div>
      </a>
    `).join("");

  } catch(e){
    document.getElementById("latest-members").innerText="Failed to load.";
  }
}

load();
setInterval(load, 300000);
</script>

</body>
</html>
